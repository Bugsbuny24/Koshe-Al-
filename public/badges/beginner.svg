<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="95" fill="url(#bg)" opacity="0.15" stroke="#0ea5e9" stroke-width="2"/>
  <!-- Badge body -->
  <polygon points="100,10 120,40 155,30 145,65 175,80 155,105 165,140 130,140 110,170 100,140 90,170 70,140 35,140 45,105 25,80 55,65 45,30 80,40" fill="url(#bg)"/>
  <polygon points="100,10 120,40 155,30 145,65 175,80 155,105 165,140 130,140 110,170 100,140 90,170 70,140 35,140 45,105 25,80 55,65 45,30 80,40" fill="url(#shine)"/>
  <!-- Star -->
  <text x="100" y="105" font-size="42" text-anchor="middle" fill="white" font-family="serif">⭐</text>
  <!-- Label -->
  <text x="100" y="155" font-size="11" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-weight="600" letter-spacing="2">BAŞLANGIÇ</text>
</svg>
