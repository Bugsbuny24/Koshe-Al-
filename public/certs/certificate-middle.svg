<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" width="400" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a" />
      <stop offset="100%" style="stop-color:#1e1b4b" />
    </linearGradient>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4" />
      <stop offset="100%" style="stop-color:#3b82f6" />
    </linearGradient>
  </defs>
  <rect width="400" height="280" rx="16" fill="url(#bg)"/>
  <rect x="2" y="2" width="396" height="276" rx="15" fill="none" stroke="url(#border)" stroke-width="3"/>
  <!-- Decorative corner lines -->
  <line x1="20" y1="2" x2="2" y2="20" stroke="#06b6d4" stroke-width="2"/>
  <line x1="380" y1="2" x2="398" y2="20" stroke="#06b6d4" stroke-width="2"/>
  <line x1="20" y1="278" x2="2" y2="260" stroke="#06b6d4" stroke-width="2"/>
  <line x1="380" y1="278" x2="398" y2="260" stroke="#06b6d4" stroke-width="2"/>
  <!-- Logo area -->
  <text x="200" y="70" font-size="28" text-anchor="middle" fill="#06b6d4" font-family="system-ui, sans-serif" font-weight="700" letter-spacing="4">KOSHEI AI</text>
  <text x="200" y="92" font-size="11" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" letter-spacing="3">FOREIGN LANGUAGE UNIVERSITY</text>
  <!-- Divider -->
  <line x1="60" y1="105" x2="340" y2="105" stroke="#06b6d4" stroke-width="0.5" opacity="0.5"/>
  <!-- Certificate title -->
  <text x="200" y="135" font-size="14" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" letter-spacing="2">SERTİFİKA</text>
  <text x="200" y="165" font-size="22" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-weight="700">Orta Seviye Sertifikası</text>
  <!-- Level badge -->
  <rect x="150" y="180" width="100" height="28" rx="14" fill="#06b6d4" opacity="0.15"/>
  <text x="200" y="199" font-size="12" text-anchor="middle" fill="#06b6d4" font-family="system-ui, sans-serif" font-weight="600" letter-spacing="2">B1 LEVEL</text>
  <!-- Bottom -->
  <text x="200" y="250" font-size="10" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" letter-spacing="1">Koshei AI • Digital Certificate</text>
</svg>
